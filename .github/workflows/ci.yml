name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  backend:
    name: Backend CI (Python)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          if [ -d app/tests ] && [ -n "$(ls -A app/tests)" ]; then
            pytest app/tests -v
          else
            echo "No tests found, skipping"
          fi

  frontend:
    name: Frontend CI (Node)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose config
        working-directory: backend/deployments/docker
        run: |
          cp ../../.env.example ../../.env 2>/dev/null || \
            echo -e "DATABASE_URL=postgresql://user:pass@localhost:5432/db\nREDIS_URL=redis://localhost:6379\nSECRET_KEY=ci-secret\nENVIRONMENT=production" > ../../.env
          docker compose config --quiet

      - name: Build backend Docker image
        working-directory: backend/deployments/docker
        run: docker compose build backend
