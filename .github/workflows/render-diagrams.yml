name: Render Mermaid Diagrams

on:
  push:
    paths:
      - "docs/diagrams/**.mmd"

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 20

      - name: Install Mermaid CLI
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Render diagrams
        run: |
          mkdir -p docs/diagrams/render
          echo '{"args":["--no-sandbox"]}' > /tmp/puppeteer-config.json
          for file in docs/diagrams/*.mmd; do
            name=$(basename "${file%.mmd}")
            output="docs/diagrams/render/${name}.svg"
            mmdc -i "$file" -o "$output" -b transparent -p /tmp/puppeteer-config.json
            echo "Rendered: $file → $output"
          done

      - name: Commit and push SVGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/diagrams/render/*.svg
          git diff --cached --quiet || git commit -m "chore: auto-render mermaid diagrams to SVG"
          git push
